;                                    PROFETA - ORCHESTRATOR SCHEDULING
; ═══════════════════════════════════════════════════════════════════════════════════════════
;
; Configurazione per distribuire gli orchestrator su minuti diversi
; Evita GPU overload quando ci sono molti epic
;
; ═══════════════════════════════════════════════════════════════════════════════════════════

[SCHEDULING]
; MINUTO DI PARTENZA per ogni epic
; Valori: 0-59 (minuto dell'ora)
; 
; Esempio:
;   EURUSD = 0  → Parte al minuto 0 (es: 10:00, 11:00)
;   BTCUSD = 10 → Parte al minuto 10 (es: 10:10, 11:10)
;   NVDA = 20   → Parte al minuto 20 (es: 10:20, 11:20)
;
; Consigliato:
;   - 5-10 minuti di distanza tra epic
;   - Iniziare da :00 per epic prioritari
;   - Lasciare almeno 10 min tra training (tempo medio esecuzione)

EURUSD = 0
BTCUSD = 10
GOLD = 20
US500 = 35
; NVDA = 20  (azioni US non supportate su demo Capital.com)
; AAPL = 35  (azioni US non supportate su demo Capital.com)
TSLA = 40
; GOLD = 50  (spostato a :20)

; ═══════════════════════════════════════════════════════════════════════════════════════════
;                                    NOTE IMPORTANTI
; ═══════════════════════════════════════════════════════════════════════════════════════════
;
; 1. PERCHÉ DISTRIBUIRE?
;    - Evita GPU overload (tutti i training insieme)
;    - Ogni training richiede ~10-20 minuti
;    - Con 6 epic, se partono tutti a :00, il ultimo finisce a :02
;
; 2. COME SCEGLIERE I MINUTI?
;    - Epic prioritari (forex): :00, :05
;    - Epic secondari (crypto): :10, :15, :20
;    - Epic minori (stocks): :25, :30, :35
;    - Commodities: :40, :45, :50
;
; 3. QUANTI EPIC POSSO GESTIRE?
;    - Con 10 min di training: max 6 epic/ora
;    - Con 5 min di training: max 12 epic/ora
;    - Se superi il limite, aumenta l'intervallo (es: ogni 2 ore)
;
; 4. ESEMPI DI CONFIGURAZIONE
;
;    Piccolo (3 epic):
;      EURUSD = 0
;      BTCUSD = 20
;      NVDA = 40
;
;    Medio (6 epic):
;      EURUSD = 0, GBPUSD = 10, BTCUSD = 20
;      ETHUSD = 30, NVDA = 40, AAPL = 50
;
;    Grande (12 epic):
;      Forex: EURUSD=0, GBPUSD=5, USDJPY=10
;      Crypto: BTCUSD=15, ETHUSD=20, XRPUSD=25
;      Stocks: NVDA=30, AAPL=35, TSLA=40
;      Commodities: GOLD=45, SILVER=50, OIL=55
;
