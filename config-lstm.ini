; ║            ██║  ███╗██████╔╝███████║██╔██╗ ██║██║   ██║██║     ███████║██████╔╝██║   ██║    ╚████╔╝            ║
; ║            s██║   ██║██╔══██╗██╔══██║██║╚██╗██║██║   ██║██║     ██╔══██║██╔══██╗██║   ██║     ╚██╔╝             ║
; ║            ╚██████╔╝██║  ██║██║  ██║██║ ╚████║╚██████╔╝███████╗██║  ██║██║  ██║██║   ██║      ██║              ║
; ║             ╚═════╝ ╚═╝  ╚═╝╚═╝  ╚═╝╚═╝  ╚═══╝ ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝  ╚═╝╚═╝   ╚═╝      ╚═╝              ║
; ║                                                                                                                ║
; ║                              Gestione Granularità Temporali Multi-Livello                                      ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

[GRANULARITY]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ INPUT GRANULARITY - Granularità dei dati in ingresso                                       │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Valori disponibili:                                                                        │
; │   auto   : Rilevamento automatico dagli intervalli tra timestamp (CONSIGLIATO)             │
; │   second : Dati al secondo                                                                 │
; │   minute : Dati al minuto                                                                  │
; │   hour   : Dati all'ora                                                                    │
; │   day    : Dati giornalieri                                                                │
; │   week   : Dati settimanali                                                                │
; │   month  : Dati mensili                                                                    │
; │                                                                                            │
; │ Il sistema analizza gli intervalli mediani tra timestamp per determinare                   │
; │ automaticamente la granularità. Specificare manualmente solo se l'auto-detection           │
; │ non funziona correttamente (es: dati molto irregolari).                                    │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
input_granularity = auto
;
; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MODEL GRANULARITY - Granularità di lavoro per i modelli LSTM                               │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ I dati vengono resamplati a questa granularità PRIMA del training.                         │
; │ I modelli LSTM elaborano sequenze a questa granularità.                                    │
; │                                                                                            │
; │ Valori: second | minute | hour | day                                                       │
; │                                                                                            │
; │ Logica di resampling:                                                                      │
; │   • Se input < model → DOWNSAMPLING (aggregazione con resample_method)                     │
; │     Esempio: second → minute (60 secondi aggregati in 1 minuto)                            │
; │                                                                                            │
; │   • Se input > model → UPSAMPLING (interpolazione lineare)                                 │
; │     Esempio: hour → minute (1 ora espansa in 60 minuti)                                    │
; │                                                                                            │
; │   • Se input = model → Nessun resampling                                                   │
; │                                                                                            │
; │ Consiglio: Usare la granularità naturale dei dati per evitare perdita di informazione      │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
model_granularity = minute

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ OUTPUT GRANULARITY - Granularità delle previsioni in uscita                                │
; ├────────────s────────────────────────────────────────────────────────────────────────────────┤
; │ Le previsioni future vengono generate e ALLINEATE a questa granularità.                    │
; │ L'allineamento garantisce timestamp "puliti" (ore intere, minuti interi, etc.)             │
; │                                                                                            │
; │ Valori: second | minute | hour | day | week | month                                        │
; │                                                                                            │
; │ Esempio con output_granularity = hour:                                                     │
; │   Ultimo dato: 2025-01-15 10:45:30                                                         │
; │   Previsioni:  2025-01-15 11:00:00, 12:00:00, 13:00:00, ...                                │
; │                                                                                            │
; │ Esempio con output_granularity = minute:                                                   │
; │   Ultimo dato: 2025-01-15 10:45:30                                                         │
; │   Previsioni:  2025-01-15 10:46:00, 10:47:00, 10:48:00, ...                                │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
output_granularity = hour

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ RESAMPLE METHOD - Metodo di aggregazione per downsampling                                  │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Quando input_granularity < model_granularity, i dati vengono aggregati.                    │
; │                                                                                            │
; │ Metodi disponibili:                                                                        │
; │   ohlc        : Open-High-Low-Close (CONSIGLIATO per dati finanziari)                      │
; │            s     Preserva: open=first, high=max, low=min, close=last, volume=sum            │
; │   mean        : Media dei valori nel periodo                                               │
; │   last        : Ultimo valore del periodo                                                  │
; │   first       : Primo valore del periodo                                                   │
; │   sum         : Somma dei valori (utile per volumi)                                        │
; │   median      : Mediana dei valori (robusta a outliers)                                    │
; │   min         : Valore minimo                                                              │
; │   max         : Valore massimo                                                             │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
resample_method = ohlc

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ AUTO SORT - Ordinamento automatico cronologico                                             │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Rileva automaticamente se i dati sono in ordine inverso e li riordina              │
; │         (es: dati esportati da alcune API con ordine decrescente)                          │
; │ false : Assume che i dati siano già in ordine cronologico                                  │
; │                                                                                            │
; │ Il sistema analizza la direzione degli intervalli timestamp:                               │
; │   • >90% negativi → Ordine inverso, viene applicato sort ascendente                        │
; │   • >10% negativi → Ordine misto, viene applicato sort ascendente                          │
; │   • <10% negativi → Ordine corretto, nessuna modifica                                      │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
auto_sort = true

; ─────────────────────────────────────────────────────────────────────────────────────────────
; GAP HANDLING - Gestione periodi mancanti nella serie temporale
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ DETECT GAPS - Rileva e gestisce i gaps nei dati                                            │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Analizza i dati per identificare periodi mancanti e li gestisce                    │
; │ false : Non esegue analisi dei gaps (più veloce ma può causare problemi)                   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
detect_gaps = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ FILL GAPS METHOD - Metodo per riempire i periodi mancanti                                  │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Metodi disponibili:                                                                        │
; │   ffill       : Forward fill - usa l'ultimo valore valido (CONSIGLIATO)                    │
; │                 Esempio: [100, NaN, NaN, 105] → [100, 100, 100, 105]                       │
; │                                                                                            │
; │   bfill       : Backward fill - usa il prossimo valore valido                              │
; │                 Esempio: [100, NaN, NaN, 105] → [100, 105, 105, 105]                       │
; │                                                                                            │
; │   interpolate : Interpolazione lineare                                                     │
; │                 Esempio: [100, NaN, NaN, 105] → [100, 101.67, 103.33, 105]                 │
; │                                                                                            │
; │   drop        : Rimuovi le righe con gaps (può ridurre molto i dati)                       │
; │   zero        : Riempi con zero (NON consigliato per prezzi)                               │
; │   mean        : Riempi con la media della serie                                            │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
fill_gaps_method = ffill

; ─────────────────────────────────────────────────────────────────────────────────────────────
; VALIDAZIONE DATI
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MIN DATA POINTS - Numero minimo di punti dati richiesti                                    │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Numero minimo di record richiesti DOPO il preprocessing e resampling.                      │
; │ Se i dati risultanti sono inferiori, viene generato un errore.                             │
; │                                                                                            │
; │ Consiglio: almeno 10x la sequence_length più lunga tra i modelli                           │
; │ Esempio: se sequence_length massima = 90, usare min_data_points >= 900                     │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
min_data_points = 1000

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MAX GAP TOLERANCE - Tolleranza massima per gaps consecutivi                                │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Numero massimo di periodi mancanti consecutivi prima di generare un warning.               │
; │ Espresso in unità della granularità del modello.                                           │
; │                                                                                            │
; │ Esempio con model_granularity = minute e max_gap_tolerance = 10:                           │
; │   Gap di 8 minuti  → Silenzioso, gestito normalmente                                       │
; │   Gap di 15 minuti → Warning nel log                                                       │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
max_gap_tolerance = 10



; ╔════════════════════════════════════════════════════════════════════════════════════════════╗
; ║                                                                                            ║
; ║          ███████╗ ██████╗██╗  ██╗███████╗██████╗ ██╗   ██╗██╗     ███████╗██████╗          ║
; ║          ██╔════╝██╔════╝██║  ██║██╔════╝██╔══██╗██║   ██║██║     ██╔════╝██╔══██╗         ║
; ║          ███████╗██║     ███████║█████╗  ██║  ██║██║   ██║██║     █████╗  ██████╔╝         ║
; ║          ╚════██║██║     ██╔══██║██╔══╝  ██║  ██║██║   ██║██║     ██╔══╝  ██╔══██╗         ║
; ║          ███████║╚██████╗██║  ██║███████╗██████╔╝╚██████╔╝███████╗███████╗██║  ██║         ║
; ║          ╚══════╝ ╚═════╝╚═╝  ╚═╝╚══════╝╚═════╝  ╚═════╝ ╚══════╝╚══════╝╚═╝  ╚═╝         ║
; ║                                                                                            ║
; ║                         Scheduling Automatico Training e Prediction (Daemon Mode)          ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════╝

[SCHEDULER]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MODE - Modalità di esecuzione                                                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │   once   : Esecuzione singola                                                              │
; │            → Esegue training + prediction una volta e termina                              │
; │            → Ideale per testing, backtesting, esecuzioni manuali                           │
; │                                                                                            │
; │   daemon : Servizio continuo                                                               │
; │            → Esegue training e prediction secondo gli intervalli configurati               │
; │            → Rimane in esecuzione finché non viene terminato (CTRL+C o SIGTERM)            │
; │            → Ideale per sistemi di produzione, trading automatico                          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
mode = demon

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TRAINING INTERVAL - Intervallo di re-training in MINUTI                                    │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Ogni N minuti, il sistema ri-addestra tutti i modelli dell'ensemble.                       │
; │                                                                                            │
; │ Valori:                                                                                    │
; │   0     : Dsisabilita re-training periodico (training solo all'avvio)                       │
; │   N > 0 : Re-training ogni N minuti                                                        │
; │                                                                                            │
; │ Esempi comuni:                                                                             │
; │   15    : Ogni 15 minuti (per trading ad alta frequenza)                                   │
; │   60    : Ogni ora                                                                         │
; │   1440  : Ogni 24 ore                                                                      │
; │   10080 : Ogni settimana                                                                   │
; │                                                                                            │
; │ ⚠️ Il training può richiedere diversi minuti/ore a seconda dei dati e hardware             │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
training_interval_minutes = 20

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ PREDICTION INTERVAL - Intervallo di generazione previsioni in MINUTI                       │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Ogni N minuti, il sistema genera nuove previsioni con i modelli correnti.                  │
; │                                                                                            │
; │ Valori:                                                                                    │
; │   0     : Disabilita prediction periodiche (solo all'avvio)                                │
; │   N > 0 : Prediction ogni N minuti                                                         │
; │                                                                                            │
; │ Esempi comuni:                                                                             │
; │   1     : Ogni minuto (per trading ad alta frequenza)                                      │
; │   60    : Ogni ora                                                                         │
; │   180   : Ogni 3 ore                                                                       │
; │   1440  : Osgni 24 ore                                                                      │
; │                                                                                            │
; │ 💡 Le prediction sono molto più veloci del training (secondi vs minuti)                    │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
prediction_interval_minutes = 1440

; ─────────────────────────────────────────────────────────────────────────────────────────────
; COMPORTAMENTO ALL'AVVIO
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TRAIN ON STARTUP - Esegui training all'avvio del daemon                                    │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Addestra i modelli immediatamente all'avvio (consigliato)                          │
; │ false : Salta il training iniziale, usa modelli esistenti se disponibili                   │
; │                                                                                            │
; │ Utile false se: i modelli sono già addestrati e si vuole solo fare prediction              │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
train_on_startup = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ PREDICT ON STARTUP - Esegui prediction all'avvio del daemon                                │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Genera previsioni immediatamente dopo il training iniziale (consigliato)           │
; │ false : Attsende il primo intervallo di prediction                                          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
predict_on_startup = true

; ─────────────────────────────────────────────────────────────────────────────────────────────
; RESILIENZA E MONITORING
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MAX TRAINING RETRIES - Numero massimo di tentativi in caso di errore training              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Se il training fallisce, il sistema riprova fino a N volte prima di segnalare errore.      │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
max_training_retries = 3

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ HEALTH CHECK INTERVAL - Intervallo controllo stato in SECONDI                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Frequenza con cui il daemon controlla se è il momento di eseguire training o prediction.   │
; │ Valori più bassi = maggiore reattività, valori più alti = minore uso CPU in idle.          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
health_check_interval = 60

; ┌────────────s────────────────────────────────────────────────────────────────────────────────┐
; │ GRACEFUL SHUTDOWN TIMEOUT - Timeout per shutdown pulito in SECONDI                         │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Tempo massimo di attesa per completare operazioni in corso prima di forzare la chiusura.   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
graceful_shutdown_timeout = 30



; ╔════════════════════════════════════════════════════════════════════════════════════════════╗
