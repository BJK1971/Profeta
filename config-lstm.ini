; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TEST DATA PERCENTAGE - Percentuale dati usata per test finale                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Percentuale degli ultimi dati usata per valutazione delle metriche.                        │
; │ I dati di test NON sono usati per il training.                                             │
