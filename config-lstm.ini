; ║                                                                                            ║
; ║                                 Dati di Training / Fine-Tuning                             ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════╝

[DATA]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ DATA PATH -s Percorso del file CSV per training/fine-tuning                                 │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Questo file viene usato per:                                                               │
; │   • Training iniziale dei modelli                                                          │
; │   • Fine-tuning periodico (se fine_tuning = true)                                          │
; │   • Calcolo delle metriche di validazione                                                  │
; │                                                                                            │
; │ Deve contenere dati storici sufficienti per il training (vedi min_data_points).            │
; │ Può essere aggiornato periodicamente con nuovi dati per migliorare il modello.             │
; │                                                                                            │
; │ ⚠️ SEPARATO dal file di input per prediction (vedi sezione [INPUT])                        │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
data_path = ./Trading_live_data/dati-training.csv

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ LOAD FRACTION - Frazione di dati da caricare                                               │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Valore tra 0.0 e 1.0 che indica quanti dati caricare dal file.                             │
; │                                                                                            │
; │   1.0   : Carica tutti i dati (default)                                                    │
; │   0.5   : Carica il primo 50% dei dati                                                     │
; │   0.1   : Carica il primo 10% (utile per test rapidi)                                      │
; │                                                                                            │
; │ 💡 Utile per testing rapido con dataset molto grandi                                       │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
load_fraction = 1.0

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TRAIN TEST SPLIT - Rapporto training/validation                                            │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Frazione di dati usata per il training (il resto per validation).                          │
; │                                                                                            │
; │   0.8   : 80% training, 20% validation (consigliato)                                       │
; │   0.9   : 90% training, 10% validation                                                     │
; │   0.7   : 70% training, 30% validation                                                     │
; │                                                                                            │
; │ ⚠️ La divisione è sequenziale (non random) per preservare l'ordine temporale               │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
train_test_split = 0.8

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TARGET COLUMN - Nome della colonna target da prevedere                                     │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Specifica quale colonna contiene il valore da prevedere.                                   │
; │ Questa colonna viene usata sia per training che per le previsioni.                         │
; │                                                                                            │
; │ Valori comuni: close, price, value, target                                                 │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
target_column = close



; ╔════════════════════════════════════════════════════════════════════════════════════════════╗
; ║                                                                                            ║
; ║                    ████████╗██████╗  █████╗ ██╗███╗   ██╗██╗███╗   ██╗ ██████╗             ║
; ║                    ╚══██╔══╝██╔══██╗██╔══██╗██║████╗  ██║██║████╗  ██║██╔════╝             ║
; ║                       ██║   ██████╔╝███████║██║██╔██╗ ██║██║██╔██╗ ██║██║  ███╗            ║
; ║                       ██║   ██╔══██╗██╔══██║██║██║╚██╗██║██║██║╚██╗██║██║   ██║            ║
; ║                       ██║   ██║  ██║██║  ██║██║██║ ╚████║██║██║ ╚████║╚██████╔╝            ║
; ║                       ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═╝╚═╝╚═╝  ╚═══╝╚═╝╚═╝  ╚═══╝ ╚═════╝             ║
; ║                                                                                            ║
; ║                               Configurazione Training Modelli LSTM                         ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════╝

[TRAINING]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ NUM EPOCHS - Numero massimo di epoche di training                                          │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Un'epoca = una passata completa su tutti i dati di training.                               │
; │                                                                                            │
; │ Valori tipici:                                                                             │
; │   10-30   : Per fine-tuning rapido                                                         │
; │   50-100  : Per training standard                                                          │
; │   100-300 : Per training approfondito                                                      │
; │                                                                                            │
; │ ⚠️ L'early stopping può terminare il training prima se non c'è miglioramento               │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
num_epochs = 10

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ BATCH SIZE - Dimensione del batch per gradient descent                                     │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Numero di campioni elaborati prima di aggiornare i pesi.                                   │
; │                                                                                            │
; │ Valori tipici:                                                                             │
; │   16     : Batch piccolo, più rumore ma può generalizzare meglio                           │
; │   32     : Buon compromesso (consigliato)                                                  │
; │   64-128 : Batch grande, training più stabile e veloce su GPU                              │
; │                                                                                            │
; │ 💡 Batch più grandi richiedono più memoria GPU                                             │
; │ 💡 Per multi-GPU, usare multipli del numero di GPU                                         │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
batch_size = 1024

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ VALIDATION SPLIT - Frazione per validation durante il training                             │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Frazione del training set usata per validation durante l'addestramento.                    │
; │ Usata per monitorare overfitting e per early stopping.                                     │
; │                                                                                            │
; │ NOTA: Questa è una suddivisione INTERNA al training set, separata da train_test_split.     │
; │       Il flusso è: DATA → [train_test_split] → TRAIN → [validation_split] → TRAIN/VAL      │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
validation_split = 0.2

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ LEARNING RATE - Tasso di apprendimento iniziale                                            │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Controlla la velocità di aggiornamento dei pesi.                                           │
; │                                                                                            │
; │ Valori tipici:                                                                             │
; │   0.01    : Aggressivo (può divergere)                                                     │
; │   0.001   : Standard (consigliato per Adam)                                                │
; │   0.0001  : Conservativo (per fine-tuning)                                                 │
; │                                                                                            │
; │ 💡 Il learning rate viene ridotto automaticamente da ReduceLROnPlateau                     │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
learning_rate = 0.001

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ EARLY STOPPING PATIENCE - Epoche senza miglioramento prima di fermare                      │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Se la validation loss non migliora per N epoche consecutive, il training si ferma.         │
; │ I pesi migliori vengono automaticamente ripristinati.                                      │
; │                                                                                            │
; │ Valori tipici:                                                                             │
; │   5-10   : Aggressivo, ferma presto                                                        │
; │   15-20  : Standard (consigliato)                                                          │
; │   30-50  : Paziente, utile per problemi complessi                                          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
early_stopping_patience = 15

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ REDUCE LR PATIENCE - Epoche prima di ridurre il learning rate                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Se la validation loss non migliora per N epoche, il learning rate viene ridotto.           │
; │ Deve essere minore di early_stopping_patience.                                             │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
reduce_lr_patience = 7

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ REDUCE LR FACTOR - Fattore di riduzione del learning rate                                  │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Quando il learning rate viene ridotto, viene moltiplicato per questo fattore.              │
; │                                                                                            │
; │   0.5    : Dimezza il learning rate (consigliato)                                          │
; │   0.1    : Riduzione aggressiva                                                            │
; │   0.75   : Riduzione graduale                                                              │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
reduce_lr_factor = 0.5

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ FINE TUNING - Modalità fine-tuning vs training completo                                    │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Carica modelli esistenti e continua il training (fine-tuning)                      │
; │         - Più veloce                                                                       │
; │         - Preserva conoscenza precedente                                                   │
; │         - Consigliato per aggiornamenti incrementali                                       │
; │                                                                                            │
; │ false : Ricrea i modelli da zero (training completo)                                       │
; │         - Più lento                                                                        │
; │         - Può trovare soluzioni migliori                                                   │
; │         - Consigliato dopo cambiamenti significativi ai dati                               │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
fine_tuning = true

; ─────────────────────────────────────────────────────────────────────────────────────────────
; CONFIGURAZIONE MULTI-TASK LEARNING (v5.0)
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE CLASS WEIGHTS - Bilancia i pesi delle classi                                           │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Calcola e applica pesi inversamente proporzionali alla frequenza delle classi      │
; │         Utile per dataset sbilanciati (es: molti FLAT, pochi UP/DOWN)                      │
; │ false : Tutte le classi hanno lo stesso peso                                               │
; │                                                                                            │
; │ ⚠️ Rilevante solo se classification è abilitata                                            │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_class_weights = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ LOSS WEIGHTS - Pesi relativi delle loss functions                                          │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Controllano l'importanza relativa della regressione vs classificazione.                    │
; │                                                                                            │
; │ Esempi:                                                                                    │
; │   reg=1.0, cls=1.0 : Bilanciato (default)                                                  │
; │   reg=2.0, cls=1.0 : Priorità alla regressione (prezzo più accurato)                       │
; │   reg=1.0, cls=2.0 : Priorità alla classificazione (direzione più accurata)                │
; │   reg=1.0, cls=0.0 : Solo regressione (equivale a classification enabled=false)            │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
regression_loss_weight = 1.0
classification_loss_weight = 1.0



; ╔════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗
; ║                                                                                                                ║
; ║       ██████╗██╗      █████╗ ███████╗███████╗██╗███████╗██╗ ██████╗ █████╗ ████████╗██╗ ██████╗ ███╗   ██╗     ║
; ║      ██╔════╝██║     ██╔══██╗██╔════╝██╔════╝██║██╔════╝██║██╔════╝██╔══██╗╚══██╔══╝██║██╔═══██╗████╗  ██║     ║
; ║      ██║     ██║     ███████║███████╗███████╗██║█████╗  ██║██║     ███████║   ██║   ██║██║   ██║██╔██╗ ██║     ║
; ║      ██║     ██║     ██╔══██║╚════██║╚════██║██║██╔══╝  ██║██║     ██╔══██║   ██║   ██║██║   ██║██║╚██╗██║     ║
; ║      ╚██████╗███████╗██║  ██║███████║███████║██║██║     ██║╚██████╗██║  ██║   ██║   ██║╚██████╔╝██║ ╚████║     ║
; ║       ╚═════╝╚══════╝╚═╝  ╚═╝╚══════╝╚══════╝╚═╝╚═╝     ╚═╝ ╚═════╝╚═╝  ╚═╝   ╚═╝   ╚═╝ ╚═════╝ ╚═╝  ╚═══╝     ║
; ║                                                                                                                ║
; ║                             Classificazione Trend (UP / FLAT / DOWN)                                           ║
; ║                                     *** DISABILITABILE ***                                                     ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝

[CLASSIFICATION]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ ⭐ ENABLED - Abilita/disabilita la classificazione del trend                               │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ PARAMETRO CHIAVE per controllare la modalità operativa del sistema:                        │
; │                                                                                            │
; │   true  : MODALITÀ IBRIDA                                                                  │
; │           → Il modello predice sia VALORE che DIREZIONE                                    │
; │           → Output: predicted_value + trend_class + confidence + signal                    │
; │           → Architettura: Multi-Head (Regression + Classification)                         │
; │                                                                                            │
; │   false : MODALITÀ SOLO REGRESSIONE                                                        │
; │           → Il modello predice solo il VALORE                                              │
; │           → Output: predicted_value                                                        │
; │           → Architettura: Head classificazione usa dummy labels                            │
; │           → ⚡ Leggermente più veloce nel training                                          │
; │                                                                                            │
; │ 💡 Impostare false per replicare il comportamento di PROFETA v4.x                          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
enabled = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ NUM CLASSES - Numero di classi per la classificazione                                      │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │   3 : DOWN | FLAT | UP (consigliato)                                                       │
; │       - DOWN : trend negativo (rendimento < -threshold)                                    │
; │       - FLAT : trend neutro (|rendimento| <= threshold)                                    │
; │       - UP   : trend positivo (rendimento > threshold)                                     │
; │                                                                                            │
; │   5 : STRONG_DOWN | DOWN | FLAT | UP | STRONG_UP (avanzato)                                │
; │       - Aggiunge classi per movimenti molto forti                                          │
; │       - Richiede soglie aggiuntive (strong_threshold)                                      │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
num_classes = 3

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ THRESHOLD MODE - Metodo di calcolo della soglia per classificazione                        │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ La soglia determina quando un movimento è considerato UP/DOWN vs FLAT.                     │
; │                                                                                            │
; │   fixed      : Usa il valore fisso specificato in 'threshold'                              │
; │                Esempio: threshold = 0.001 → +/-0.1% è FLAT                                 │
; │                                                                                            │
; │   percentile : Soglia basata sul percentile dei rendimenti storici                         │
; │                Usa il 50° percentile dei rendimenti assoluti                               │
; │                                                                                            │
; │   volatility : Soglia basata sulla volatilità storica (CONSIGLIATO)                        │
; │                threshold = 0.5 * rolling_std(returns, 20)                                  │
; │                Si adatta automaticamente alla volatilità del mercato                       │
; │                                                                                            │
; │   atr        : Soglia basata sull'Average True Range                                       │
; │                Richiede colonne OHLC nei dati                                              │
; │                                                                                            │
; │   adaptive   : Combinazione di volatility e percentile (CONSIGLIATO PER v5.0)              │
; │                threshold = (volatility_threshold + percentile_threshold) / 2               │
; │                ⭐ OTTIMIZZATO per il sistema delta-based di PROFETA v5.0                   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
threshold_mode = adaptive

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ THRESHOLD - Soglia fissa per classificazione (usata se threshold_mode = fixed)             │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Valore espresso come frazione (non percentuale).                                           │
; │                                                                                            │
; │ Esempi:                                                                                    │
; │   0.001  : 0.1% → movimenti minori di ±0.1% sono FLAT                                      │
; │   0.005  : 0.5% → movimenti minori di ±0.5% sono FLAT                                      │
; │   0.01   : 1.0% → movimenti minori di ±1.0% sono FLAT                                      │
; │                                                                                            │
; │ ⚠️ Per PROFETA v5.0 delta-based: usa valori assoluti in $, non percentuali                 │
; │ ⚠️ Se threshold_mode = adaptive/volatility/percentile, questo valore è un fallback        │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
threshold = 50

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ VOL_WINDOW - Finestra per calcolo volatilità (in timesteps)                                │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Usato quando threshold_mode = volatility o adaptive.                                       │
; │ Valori tipici: 20-50 per dati minuto, 10-20 per dati orari                                 │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
vol_window = 30

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ PREDICTION HORIZON - Orizzonte temporale per calcolo del trend                             │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Numero di periodi in avanti per calcolare il rendimento futuro.                            │
; │ Espresso in unità della granularità del modello.                                           │
; │                                                                                            │
; │ Esempi con model_granularity = minute:                                                     │
; │   1   : Trend basato su variazione al minuto successivo                                    │
; │   5   : Trend basato su variazione nei prossimi 5 minuti                                   │
; │   60  : Trend basato su variazione nella prossima ora                                      │
; │                                                                                            │
; │ Formula: future_return = (price[t+horizon] - price[t]) / price[t]                          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
prediction_horizon = 1



