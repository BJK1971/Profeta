test_data_percentage = 0.1

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ NUM FUTURE STEPS - Numero di previsioni future da generare                                 │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Quante previsioni generare nel futuro, espresse in output_granularity.                     │
; │                                                                                            │
; │ Esempio con output_granularity = hour e num_future_steps = 71:                             │
; │   → Genera 71 previsioni orarie = ~3 giorni di previsioni                                  │
; │                                                                                            │
; │ Esempio con output_granularity = minute e num_future_steps = 60:                           │
; │   → Genera 60 previsioni al minuto = 1 ora di previsioni                                   │
; │                                                                                            │
; │ ⚠️ Previsioni molto lontane nel futuro hanno incertezza crescente                          │
; │    La confidence decresce naturalmente all'aumentare dell'orizzonte                        │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
num_future_steps = 72

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ GRAPH - Genera grafico di analisi delle previsioni                                         │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Genera file PNG con visualizzazione completa                                       │
; │         Include: serie storica, previsioni, probabilità classi, metriche                   │
; │ false : Non genera grafico (più veloce)                                                    │
