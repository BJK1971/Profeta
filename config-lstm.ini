; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE GPU - Abilita/disabilita accelerazione GPU                                             │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Utilizza GPU NVIDIA se disponibile (richiede CUDA + cuDNN)                         │
; │ false : Forza esecuzione su CPU (utile per debugging o sistemi senza GPU)                  │
; │                                                                                            │
; │ Se true ma nessuna GPU è disponibile, il sistema fallback automaticamente su CPU.          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_gpu = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MULTI GPU - Strategia di distribuzione multi-GPU                                           │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Valori disponibili:                                                                        │
; │   auto   : Rilevamento automatico (consigliato)                                            │
; │            - 1 GPU → OneDeviceStrategy                                                     │
; │            - 2+ GPU → MirroredStrategy                                                     │
; │   single : Usa solo la prima GPU (GPU:0)                                                   │
; │   mirror : MirroredStrategy - replica il modello su tutte le GPU                           │
; │   off    : Disabilita GPU completamente                                                    │
; │                                                                                            │
; │ ⚠️ NOTA: MirroredStrategy funziona meglio con batch_size multipli del numero di GPU        │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
multi_gpu = auto

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MIXED PRECISION - Abilita calcolo in precisione mista FP16/FP32                            │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Abilita mixed precision (richiede GPU con Compute Capability >= 7.0)               │
; │         - GPU supportate: RTX 20xx, RTX 30xx, RTX 40xx, Tesla V100, A100, H100             │
; │         - Benefici: ~2x velocità training, ~50% riduzione memoria GPU                      │
; │ false : Usa solo FP32 (compatibilità massima)                                              │
; │                                                                                            │
; │ ⚠️ Il sistema verifica automaticamente il supporto e disabilita se non disponibile         │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
mixed_precision = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ GPU MEMORY GROWTH - Allocazione dinamica memoria GPU                                       │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Alloca memoria GPU incrementalmente secondo necessità (consigliato)                │
; │         Permette di eseguire altri processi sulla stessa GPU                               │
; │ false : Pre-alloca tutta la memoria GPU disponibile all'avvio                              │
; │         Può causare errori OOM se altri processi usano la GPU                              │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
gpu_memory_growth = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ GPU MEMORY sLIMIT - Limite massimo memoria GPU in MB                                        │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ 0     : Nessun limite, usa tutta la memoria disponibile                                    │
; │ N     : Limita a N megabytes (es: 8192 = 8GB)                                              │
; │                                                                                            │
; │ Utile quando si condivide la GPU con altri processi o in ambienti containerizzati.         │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
gpu_memory_limit = 0



