[ENSEMBLE]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ NUM MODELS - Numero di modelli nell'ensemble                                               │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Quanti modelli [MODEL_N] vengono usati per l'ensemble.                                     │
; │ Deve essere <= al numero di sezioni [MODEL_N] definite sotto.                              │
; │                                                                                            │
; │ Benefici dell'ensemble:                                                                    │
; │   • Riduce l'overfitting (media degli errori)                                              │
; │   • Migliora la robustezza (diversità di architetture)                                     │
; │   • Fornisce stima dell'incertezza (varianza tra modelli)                                  │
; │                                                                                            │
; │ Trade-off:                                                                                 │
; │   • Più modelli = migliore accuratezza ma più tempo training/inference                     │
; │   • Più modelli = più memoria GPU/RAM necessaria                                           │
; │                                                                                            │
; │ Valori tipici:                                                                             │
; │   3-5   : Ensemble leggero (veloce)                                                        │
; │   10-15 : Ensemble bilanciato                                                              │
; │   20-33 : Ensemble completo (massima accuratezza)                                          │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
num_models = 20



; ╔════════════════════════════════════════════════════════════════════════════════════════════╗
; ║                                                                                            ║
; ║                 ███╗   ███╗ ██████╗ ██████╗ ███████╗██╗     ███████╗                       ║
; ║                 ████╗ ████║██╔═══██╗██╔══██╗██╔════╝██║     ██╔════╝                       ║
; ║                 ██╔████╔██║██║   ██║██║  ██║█████╗  ██║     ███████╗                       ║
; ║                 ██║╚██╔╝██║██║   ██║██║  ██║██╔══╝  ██║     ╚════██║                       ║
; ║                 ██║ ╚═╝ ██║╚██████╔╝██████╔╝███████╗███████╗███████║                       ║
; ║                 ╚═╝     ╚═╝ ╚═════╝ ╚═════╝ ╚══════╝╚══════╝╚══════╝                       ║
; ║                                                                                            ║
; ║                            Configurazione Singoli Modelli LSTM (1-33)                      ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════╝
;
; ┌────────────────────────────────────────────────────────────────────────────────────────────────────────────────┐
; │ PARAMETRI DISPONIBILI PER OGNI MODELLO                                                                         │
; ├────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤
; │                                                                                                                │
; │   sequence_length    : Lunghezza della sequenza di input (timesteps)                                           │
; │                        Valori tipici: 30, 45, 60, 75, 90, 120                                                  │
; │                        Più lungo = più contesto storico, ma più memoria e rischio overfitting                  │
; │                                                                                                                │
; │   lstm_units         : Numero di unità/neuroni nei layer LSTM                                                  │
; │                        Valori tipici: 32, 64, 128, 256, 512                                                    │
; │                        Più unità = maggiore capacità ma più lento e rischio overfitting                        │
; │                                                                                                                │
; │   dropout_rate       : Tasso di dropout per regolarizzazione                                                   │
; │                        Valori tipici: 0.1, 0.2, 0.3, 0.4                                                       │
; │                        Più alto = più regolarizzazione, previene overfitting                                   │
; │                                                                                                                │
; │   use_bidirectional  : Usa LSTM bidirezionale                                                                  │
; │                        True  = elabora la sequenza in entrambe le direzioni (più lento, spesso migliore)       │
; │                        False = elabora solo in avanti (più veloce)                                             │
; │                                                                                                                │
; │   num_lstm_layers    : Numero di layer LSTM impilati (opzionale, default=3)                                    │
; │                        Valori tipici: 2, 3, 4                                                                  │
; │                        Più layer = modello più profondo, può catturare pattern complessi                       │
; │                                                                                                                │
; │   use_attention      : Aggiungi meccanismo di attenzione dopo LSTM (opzionale, default=false)                  │
; │                        True  = usa Multi-Head Attention (migliore per sequenze lunghe)                         │
; │                        False = solo LSTM standard                                                              │
; │                                                                                                                │
; └────────────────────────────────────────────────────────────────────────────────────────────────────────────────┘
;
; 💡 STRATEGIA DI DIVERSIFICAZIONE:
;    L'ensemble funziona meglio quando i modelli sono DIVERSI tra loro.
;    Varare: sequence_length, lstm_units, dropout_rate, bidirectional, attention
;    per creare un ensemble eterogeneo e robusto.

; ─────────────────────────────────────────────────────────────────────────────────────────────
; MODELLI 1-5: Configurazioni Base con sequence_length = 60
; ─────────────────────────────────────────────────────────────────────────────────────────────

[MODEL_1]
; Modello base bilanciato - BiLSTM 64 units
sequence_length = 60
lstm_units = 64
dropout_rate = 0.2
use_bidirectional = True
num_lstm_layers = 3

[MODEL_2]
; Modello unidirezionale - LSTM 64 units
sequence_length = 60
lstm_units = 64
dropout_rate = 0.2
use_bidirectional = False
