[REPORT]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ ⭐ ENABLED - Abilita/disabilita la generazione del report PDF                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ PARAMETRO CHIAVE per controllare la generazione automatica dei report:                     │
; │                                                                                            │
; │   true  : GENERA REPORT PDF                                                                │
; │           → Dopo ogni ciclo di prediction viene generato un report completo                │
; │           → Include: metriche, analisi modelli, grafici, segnali                           │
; │           → Consigliato per: analisi manuali, presentazioni, audit                         │
; │                                                                                            │
; │   false : NON GENERA REPORT PDF                                                            │
; │           → Nessun overhead di generazione PDF                                             │
; │           → Consigliato per: daemon mode produzione, alta frequenza                        │
; │                                                                                            │
; │ 💡 SUGGERIMENTO:                                                                           │
; │    - Daemon mode con training frequente → false (evita centinaia di PDF)                   │
; │    - Analisi one-shot o settimanale → true (documentazione completa)                       │
; │    - Presentazioni a stakeholder → true                                                    │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
enabled = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ REPORT OUTPUT DIRECTORY - Directory dove salvare i report PDF                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ I report vengono salvati con naming: PROFETA_Report_YYYYMMDD_HHMMSS.pdf                    │
; │ La directory viene creata automaticamente se non esiste.                                   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
output_dir = ./reports

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ REPORT TITLE - Titolo personalizzato del report                                            │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Appare sulla cover page e negli header.                                                    │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
title = PROFETA Analysis Report

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ REPORT SUBTITLE - Sottotitolo del report                                                   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
subtitle = Universal Multi-Domain Hybrid Prediction System

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ COMPANY NAME - Nome azienda per branding                                                   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
company = BilliDynamics™

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ AUTHOR - Autore del report (per metadati PDF)                                              │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
author = PROFETA v5.0

; ─────────────────────────────────────────────────────────────────────────────────────────────
; OPZIONI DI FORMATTAZIONE
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ CONFIDENTIAL - Mostra avviso "CONFIDENTIAL" nel footer                                     │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Aggiunge "CONFIDENTIAL - PROPRIETARY INFORMATION" in ogni pagina                   │
; │ false : Nessun avviso di confidenzialità                                                   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
confidential = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ INCLUDE DISCLAIMER - Includi sezione disclaimer legale                                     │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Aggiunge disclaimer finanziario e legale alla fine del report                      │
; │ false : Omette la sezione disclaimer                                                       │
; │                                                                                            │
; │ ⚠️ CONSIGLIATO: true per qualsiasi report distribuito esternamente                        │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
include_disclaimer = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ INCLUDE WATERMARK - Aggiungi watermark "DRAFT" alle pagine                                 │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Watermark diagonale "DRAFT" su ogni pagina (per bozze)                             │
; │ false : Nessun watermark (per versioni finali)                                             │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
include_watermark = false

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ LANGUAGE - Lingua del report                                                               │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │   en : Inglese (default)                                                                   │
; │   it : Italiano                                                                            │
; │                                                                                            │
; │ ⚠️ NOTA: Attualmente supportato solo inglese. Italiano in sviluppo.                       │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
language = en

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ PAGE SIZE - Formato pagina                                                                 │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │   A4     : Standard europeo (210 x 297 mm) - DEFAULT                                       │
; │   letter : Standard USA (8.5 x 11 inches)                                                  │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
page_size = A4

; ─────────────────────────────────────────────────────────────────────────────────────────────
; CONTENUTO DEL REPORT
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ INCLUDE MODEL DETAILS - Includi analisi dettagliata dei modelli                            │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Mostra tabella con top 10 modelli, performance, configurazioni                     │
; │ false : Omette sezione analisi modelli (report più snello)                                 │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
include_model_details = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ INCLUDE CHARTS - Includi grafici e visualizzazioni                                         │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Include pie chart segnali, bar chart classi, grafico predizioni                    │
; │ false : Solo tabelle e testo (più veloce, file più piccolo)                                │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
include_charts = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ INCLUDE PREDICTION GRAPH - Embed il grafico PNG delle predizioni                           │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Incorpora il grafico generato da PROFETA nel report                                │
; │ false : Non include il grafico (utile se graph = false in [PREDICTION])                    │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
include_prediction_graph = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TOP MODELS COUNT - Quanti modelli mostrare nella classifica                                │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Numero di modelli da includere nella tabella "Top Performing Models".                      │
; │ Valori tipici: 5, 10, 15, 20                                                               │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
top_models_count = 10

