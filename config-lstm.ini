[SYSTEM]

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ LOG LEVEL - Livello di dettaglio dei messaggi di log                                       │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Valori disponibili:                                                                        │
; │   DEBUG   : Massimo dettaglio, include informazioni di debug (per sviluppo)                │
; │   INFO    : Informazioni operative standard (consigliato per produzione)                   │
; │   WARNING : Solo avvisi e errori                                                           │
; │   ERROR   : Solo errori critici                                                            │
; │                                                                                            │
; │ Consiglio: Usare DEBUG durante lo sviluppo/testing, INFO in produzione                     │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
log_level = INFO

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ LOG FILE - Percorso del file di log                                                        │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Se specificato, i log vengono scritti sia su console che su file.                          │
; │ La directory viene creata automaticamente se non esiste.                                   │
; │ Lasciare vuoto o commentare per log solo su console.                                       │
; │                                                                                            │
; │ Esempio Windows: C:/PROFETA-CFX/logs/profeta.log                                           │
; │ Esempio Linux:   /var/log/profeta/profeta.log                                              │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
log_file = ./logs/profeta-v5.log

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ RANDOM SEED - Seme per riproducibilità                                                     │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Imposta il seme per tutti i generatori di numeri casuali (NumPy, TensorFlow).              │
; │ Usare lo stesso seed garantisce risultati riproducibili tra esecuzioni.                    │
; │                                                                                            │
; │ ⚠️ NOTA: La riproducibilità completa su GPU non è sempre garantita a causa                 │
; │          delle operazioni parallele non-deterministiche.                                   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
random_seed = 42

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ OUTPUT DIRECTORY - Directory principale per gli output                                     │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Directory dove vengono salvati i file di output generici.                                  │
; │ Sottodirectory vengono create automaticamente per organizzare gli output.                  │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
Output_dir = ../output

