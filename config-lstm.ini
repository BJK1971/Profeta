; ║                                                                                            ║
; ║                       Strategia di Fusione Regressione + Classificazione                   ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════╝

[FUSION]

; ╔════════════════════════════════════════════════════════════════════════════════════════════╗
; ║                    PROFETA v5.0 PRODUCTION - CONFIGURAZIONE FUSIONE                        ║
; ╠════════════════════════════════════════════════════════════════════════════════════════════╣
; ║                                                                                            ║
; ║   La classificazione è DERIVATA direttamente dal delta predetto dalla regressione.         ║
; ║   Questo garantisce:                                                                       ║
; ║   • 100% coerenza tra prezzo predetto e direzione                                          ║
; ║   • Confidence basata sulla forza del movimento                                            ║
; ║   • Segnali affidabili come la regressione (R²=0.96)                                       ║
; ║                                                                                            ║
; ║   La classification head neurale è mantenuta per compatibilità ma NON influenza           ║
; ║   le decisioni di trading.                                                                 ║
; ║                                                                                            ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════╝

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ STRATEGY - Strategia di fusione (PRODUCTION: sempre regression_derived)                    │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
strategy = regression_derived

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ DELTA_THRESHOLD_PCT - Soglia per classificare UP/DOWN vs FLAT                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Espresso come percentuale del prezzo corrente.                                             │
; │                                                                                            │
; │   0.0003 : 0.03% (sensibile - più segnali, più rumore)                                     │
; │   0.0005 : 0.05% (bilanciato - DEFAULT) → per BTC $100k = soglia $50                       │
; │   0.001  : 0.1%  (conservativo - meno segnali, più affidabili)                             │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
delta_threshold_pct = 0.0005

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ MIN_CONFIDENCE - Soglia minima per generare segnale (sotto = HOLD)                         │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Confidence = forza del movimento predetto rispetto alla soglia                             │
; │                                                                                            │
; │   0.25 : Aggressivo (molti segnali)                                                        │
; │   0.35 : Bilanciato (DEFAULT)                                                              │
; │   0.50 : Conservativo                                                                      │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
min_confidence = 0.35

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ SIGNAL_THRESHOLD - Soglia per segnali STRONG (STRONG_BUY/STRONG_SELL)                      │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Se confidence >= signal_threshold → segnale STRONG                                         │
; │                                                                                            │
; │   0.45 : Aggressivo (più STRONG signals)                                                   │
; │   0.55 : Bilanciato (DEFAULT)                                                              │
; │   0.70 : Conservativo (solo movimenti molto forti)                                         │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
signal_threshold = 0.55

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ GENERATE_SIGNALS - Abilita generazione segnali di trading                                  │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
generate_signals = true



