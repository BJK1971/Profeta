; ║                          Profilo Dominio e Feature Engineering Adattivo                    ║
; ╚════════════════════════════════════════════════════════════════════════════════════════════╝

[DOMAIN]s

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TYPE - Tipo di dominio applicativo                                                         │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Il dominio determina il profilo di feature engineering automatico:                         │
; │                                                                                            │
; │   financial     : Mercati finanziari (crypto, forex, stocks, commodities)                  │
; │                   → Abilita: returns, volatility, technical indicators, order flow         │
; │                                                                                            │
; │   energy        : Mercati energetici (elettricità, gas, petrolio)                          │
; │                   → Abilita: temporal features, seasonal decomposition (24h, 168h)         │
; │                                                                                            │
; │   environmental : Dati ambientali/climatici                                                │
; │                   → Abilita: detrend, deseasonalize, seasonal (365d)                       │
; │                                                                                            │
; │   generic       : Dominio generico (time series qualsiasi)                                 │
; │                   → Configurazione neutra, features di base                                │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
type = financial

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ SUBTYPE - Sottotipo specifico del dominio                                                  │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Per type = financial:                                                                      │
; │   crypto      : Criptovalute (BTC, ETH, etc.) - abilita order flow analysis                │
; │   forex       : Mercato valutario                                                          │
; │   stocks      : Azioni/equity                                                              │
; │   commodities : Materie prime                                                              │
; │   indices     : Indici di borsa                                                            │
; │   bonds       : Obbligazioni                                                               │
; │   generic     : Generico finanziario                                                       │
; │                                                                                            │
; │ Per altri domini, usare 'generic' o una stringa descrittiva                                │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
subtype = crypto

; ─────────────────────────────────────────────────────────────────────────────────────────────
; FEATURE FLAGS - Abilita/disabilita gruppi di features
; ─────────────────────────────────────────────────────────────────────────────────────────────
; Ogni flag controlla un gruppo di features generate automaticamente.
; Disabilitare features non rilevanti può ridurre il rumore e migliorare le performance.
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE RETURNSs - Calcola rendimenti percentuali                                               │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Genera:                                                                                    │
; │   • return_1   : Rendimento 1 periodo                                                      │
; │   • return_5   : Rendimento 5 periodi                                                      │
; │   • return_10  : Rendimento 10 periodi                                                     │
; │   • log_return : Log-rendimento (per stabilità numerica)                                   │
; │                                                                                            │
; │ Consigliato: true per dati finanziari                                                      │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_returns = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE VOLATILITY - Calcola misure di volatilità                                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Genera:                                                                                    │
; │   • volatility_5   : Volatilità rolling 5 periodi                                          │
; │   • volatility_10  : Volatilità rolling 10 periodi                                         │
; │   • volatility_20  : Volatilità rolling 20 periodi                                         │
; │                                                                                            │
; │ Consigliato: true per mercati volatili (crypto, forex)                                     │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_volatility = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE VOLUME FEATURES - Features basate sul volume                                           │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Richiede colonna 'volume' nei dati.                                                        │
; │ Genera:                                                                                    │
; │   • volume           : Volume normalizzato                                                 │
; │   • volume_ma20      : Media mobile 20 periodi del volume                                  │
; │   • volume_ratio     : Rapporto volume corrente / media                                    │
; │                                                                                            │
; │ Consigliato: true se i dati contengono volume                                              │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_volume_features = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE ORDER FLOW - Analisi del flusso ordini (specifico per crypto)                          │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Richiede colonna 'takerBuyBAVolume' o simile nei dati.                                     │
; │ Genera:                                                                                    │
; │   • taker_buy_ratio   : Percentuale volume acquisti taker                                  │
; │   • order_imbalance   : Squilibrio tra acquisti e vendite                                  │
; │                                                                                            │
; │ Consigliato: true per dati crypto da exchange (Binance, etc.)                              │
; │ ⚠️ Se i dati non contengono le colonne richieste, viene ignorato silenziosamente           │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_order_flow = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE TEMPORAL FEATURES - Features temporali cicliche                                        │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Genera encoding ciclico (sin/cos) per catturare pattern temporali:                         │
; │   • hour_sin, hour_cos     : Ora del giorno (ciclo 24h)                                    │
; │   • day_sin, day_cos       : Giorno della settimana (ciclo 7d)                             │
; │   • month_sin, month_cos   : Mese dell'anno (ciclo 12m)                                    │
; │   • is_weekend             : Flag weekend                                                  │
; │                                                                                            │
; │ Consigliato: true per dati con pattern intraday/settimanali                                │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_temporal_features = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE TECHNICAL INDICATORS - Indicatori tecnici classici                                     │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Genera indicatori di analisi tecnica:                                                      │
; │   • RSI (14)              : Relative Strength Index                                        │
; │   • MACD, MACD_signal     : Moving Average Convergence Divergence                          │
; │   • MACD_histogram        : Istogramma MACD                                                │
; │   • BB_width, BB_position : Bollinger Bands (ampiezza e posizione)                         │
; │   • EMA_5, EMA_20         : Exponential Moving Averages                                    │
; │   • SMA_5, SMA_20         : Simple Moving Averages                                         │
; │   • ATR (14)              : Average True Range (richiede OHLC)                             │
; │            s                                                                                │
; │ Consigliato: true per analisi tecnica tradizionale                                         │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_technical_indicators = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ USE SEASONAL DECOMPOSITION - Decomposizione stagionale STL                                 │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Applica decomposizione STL (Seasonal-Trend-Loess) per estrarre:                            │
; │   • trend     : Componente di trend                                                        │
; │   • seasonal  : Componente stagionale                                                      │
; │   • residual  : Componente residua                                                         │
; │                                                                                            │
; │ Utile per: dati energetici, ambientali, con forte stagionalità                             │
; │ ⚠️ Richiede dati sufficienti per almeno 2 cicli stagionali completi                        │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
use_seasonal_decomposition = false

; ─────────────────────────────────────────────────────────────────────────────────────────────
; PREPROCESSING AVANZATO
; ─────────────────────────────────────────────────────────────────────────────────────────────

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ DETREND - Rimuovi trend dai dati                                                           │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Rimuove la componente di trend prima del training                                  │
; │ false : Mantiene i dati originali                                                          │
; │                                                                                            │
; │ Utile per: serie con trend forte non stazionario                                           │
; │ ⚠️ Per dati finanziari, preferire use_returns = true invece di detrend                     │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
detrend = false

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ DESEASONALIZE - Rimuovi stagionalità dai dati                                              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ true  : Rimuove componenti stagionali prima del training                                   │
; │ false : Mantiene i dati originali                                                          │
; │                                                                                            │
; │ Utile per: dati energetici (cicli 24h), ambientali (cicli annuali)                         │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
deseasonalize = false



