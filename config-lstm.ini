graph = true

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ ⭐ OUTPUT PREDICTIONS PATH - Percorso SPECIFICO per file CSV delle previsioni              │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Percorso completo dove salvare il file CSV delle previsioni.                               │
; │                                                                                            │
; │ Se specificato: il CSV viene salvato esattamente in questo percorso                        │
; │ Se non specificato: usa output_dir/predictions.csv                                         │
; │                                                                                            │
; │ 💡 Utile per integrazione con altri sistemi (es: Dropbox sync, trading bot)                │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
output_predictions_path = ./PREVISIONI/real_time_ens_hours.csv

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TIMESTAMP COLUMN - Nome della colonna timestamp nei dati                                   │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Nome della colonna contenente i timestamp nel file CSV.                                    │
; │ Valori comuni: timestamp, timestamp_column, date, datetime, time                           │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
timestamp_column = timestamp_column

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ TARGET COLUMN - Nome della colonna target per le previsioni                                │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Deve corrispondere a target_column in [DATA].                                              │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
target_column = close

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ OUTPUT DIR - Directory per output generici delle previsioni                                │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │ Directory dove vengono salvati: JSON, grafici, e CSV se output_predictions_path non set.   │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
output_dir = ./output

; ┌────────────────────────────────────────────────────────────────────────────────────────────┐
; │ Decay per previsioni future (più alto = meno smorzamento)                                  │
; ├────────────────────────────────────────────────────────────────────────────────────────────┤
; │  0.998 = mantiene 87% a 72h (default, adatto per crypto volatili)                          │
; │  0.995 = mantiene 70% a 72h (più conservativo)                                             │                                               
; │  0.990 = mantiene 49% a 72h (molto conservativo)                                           │
; └────────────────────────────────────────────────────────────────────────────────────────────┘
future_decay = 0.998

