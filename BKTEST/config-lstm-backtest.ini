; =======================================================
; SEZIONE BACKTEST (NUOVA)
; Configurazione Walk-Forward Validation
; =======================================================
[BACKTEST]

; ─────────────────────────────────────────────────────────
; MODALITÀ BACKTEST
; ─────────────────────────────────────────────────────────
; walk_forward = Rolling window (consigliato)
; expanding    = Training window crescente
; simple_split = Semplice 80/20 split
mode = walk_forward

; ─────────────────────────────────────────────────────────
; FINESTRE TEMPORALI
; ─────────────────────────────────────────────────────────
; Numero di fold da generare
num_folds = 24

; Giorni di training per ogni fold
train_window_days = 90

; Giorni di test per ogni fold
test_window_days = 30

; Avanzamento tra fold (solo per walk_forward)
; 30 = i fold si sovrappongono di (train_window - step)
step_days = 30

; ─────────────────────────────────────────────────────────
; CAPITALE E COSTI
; ─────────────────────────────────────────────────────────
; Capitale iniziale in USD
initial_capital = 100000

; Costo transazione in % (commissioni broker)
transaction_cost_pct = 0.1

; Slippage stimato in %
slippage_pct = 0.05

; Tasso risk-free annuo (per calcolo Sharpe)
risk_free_rate = 0.02

; ─────────────────────────────────────────────────────────
; STRATEGIA DI TRADING
; ─────────────────────────────────────────────────────────
; direction      = Buy se prediction > current
; threshold      = Solo se diff > threshold_pct
; confidence     = Basato su accordo modelli ensemble
; mean_reversion = Contrarian (compra bassi, vendi alti)
strategy = threshold

; Soglia minima per entrare in posizione (%)
; Solo per strategy = threshold o mean_reversion
threshold_pct = 0.02

; Soglia confidenza ensemble (% modelli concordi)
; Solo per strategy = confidence
confidence_threshold = 0.7

; ─────────────────────────────────────────────────────────
; POSITION SIZING
; ─────────────────────────────────────────────────────────
; Percentuale capitale per ogni trade
position_size_pct = 100

; Massimo posizioni simultanee
max_positions = 1

; Permetti short selling
allow_short = true

; ─────────────────────────────────────────────────────────
; RISK MANAGEMENT
; ─────────────────────────────────────────────────────────
; Stop loss in % (vuoto = disabilitato)
stop_loss_pct = 2.5

; Take profit in % (vuoto = disabilitato)  
take_profit_pct = 5.0

; Max drawdown oltre il quale fermare il trading
max_drawdown_pct = 30.0

; ─────────────────────────────────────────────────────────
; OUTPUT
; ─────────────────────────────────────────────────────────
; Directory output report
output_dir = /home/ubuntu/PROFETA-UNIVERSAL-V5.0/backtest_results

; Genera grafici
generate_plots = true

; Genera report Excel
generate_report = true

; Salva dettaglio trades
save_trades = true

; =======================================================
; SEZIONE DOMAIN
; =======================================================
[DOMAIN]
type = financial
subtype = crypto
use_returns = true
use_volatility = true
use_volume_features = true
use_order_flow = true
use_temporal_features = true
use_technical_indicators = true

; =======================================================
; SEZIONE GRANULARITÀ
; =======================================================
[GRANULARITY]
input_granularity = auto
model_granularity = hour
output_granularity = hour
resample_method = ohlc
detect_gaps = true
fill_gaps_method = ffill
min_data_points = 1000
max_gap_tolerance = 10

; =======================================================
; SEZIONE SCHEDULER
; =======================================================
[SCHEDULER]
mode = daemon
training_interval_minutes = 20
prediction_interval_minutes = 1440
train_on_startup = true
predict_on_startup = true
max_training_retries = 3
health_check_interval = 60
graceful_shutdown_timeout = 30

; =======================================================
; SEZIONE DATI
; =======================================================
[DATA]
data_path = /home/ubuntu/PROFETA-UNIVERSAL-V5.0/Trading_live_data/dati-training.csv
load_fraction = 1.0
train_test_split = 0.8
target_column = close
granularity = minute

; =======================================================
; SEZIONE TRAINING
; =======================================================
[TRAINING]
num_epochs = 10
batch_size = 32
validation_split = 0.2
early_stopping_patience = 5
optimizer = adam
learning_rate = 0.001
fine_tuning = 1

; =======================================================
; SEZIONE OUTPUT
; =======================================================
[OUTPUT]
model_path_keras_base = /home/ubuntu/PROFETA-UNIVERSAL-V5.0/MODELLI/real-time
model_path_h5_base = /home/ubuntu/PROFETA-UNIVERSAL-V5.0/MODELLI/real-time
scaler_path_base = /home/ubuntu/PROFETA-UNIVERSAL-V5.0/MODELLI/real-time

; =======================================================
; SEZIONE INPUT
; =======================================================
[INPUT]
input_data_path = /home/ubuntu/PROFETA-UNIVERSAL-V5.0/Trading_live_data/dati-trading.csv

; =======================================================
; SEZIONE PREDICTION
; =======================================================
[PREDICTION]
test_data_percentage = 0.1
num_future_steps = 71
grsave_predictions = output/predictions.csv
graph = 1
