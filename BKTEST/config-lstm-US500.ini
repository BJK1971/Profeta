; =======================================================
; SEZIONE BACKTEST (NUOVA)
; Configurazione Walk-Forward Validation
; =======================================================
[BACKTEST]

mode = walk_forward
num_folds = 24
train_window_days = 90
test_window_days = 30
step_days = 30

initial_capital = 100000
transaction_cost_pct = 0.1
slippage_pct = 0.05
risk_free_rate = 0.02

strategy = threshold
threshold_pct = 0.02
confidence_threshold = 0.7

position_size_pct = 100
max_positions = 1
allow_short = true

stop_loss_pct = 2.5
take_profit_pct = 5.0
max_drawdown_pct = 30.0

output_dir = ./backtest_results
generate_plots = true
generate_report = true
save_trades = true

; =======================================================
; SEZIONE DOMAIN
; =======================================================
[DOMAIN]
type = financial
subtype = crypto
use_returns = true
use_volatility = true
use_volume_features = true
use_order_flow = true
use_temporal_features = true
use_technical_indicators = true

; =======================================================
; SEZIONE GRANULARITÀ
; =======================================================
[GRANULARITY]
input_granularity = auto
model_granularity = hour
output_granularity = hour
resample_method = ohlc
detect_gaps = true
fill_gaps_method = ffill
min_data_points = 1000
max_gap_tolerance = 10

; =======================================================
; SEZIONE SCHEDULER
; =======================================================
[SCHEDULER]
mode = once
training_interval_minutes = 20
prediction_interval_minutes = 1440
train_on_startup = true
predict_on_startup = true
max_training_retries = 3
health_check_interval = 60
graceful_shutdown_timeout = 30

; =======================================================
; SEZIONE DATI
; =======================================================
[DATA]
data_path = ./Trading_live_data/dati-training.csv
load_fraction = 1.0
train_test_split = 0.8
target_column = close
granularity = minute

; =======================================================
; SEZIONE TRAINING
; =======================================================
[TRAINING]
num_epochs = 10
batch_size = 32
validation_split = 0.2
early_stopping_patience = 5
optimizer = adam
learning_rate = 0.001
fine_tuning = 1

; =======================================================
; SEZIONE OUTPUT
; =======================================================
[OUTPUT]
model_path_keras_base = ./MODELLI/real-time
model_path_h5_base = ./MODELLI/real-time
scaler_path_base = ./MODELLI/real-time

; =======================================================
; SEZIONE INPUT
; =======================================================
[INPUT]
input_data_path = ./Trading_live_data/dati-trading.csv

; =======================================================
; SEZIONE PREDICTION
; =======================================================
[PREDICTION]
test_data_percentage = 0.1
num_future_steps = 71
grsave_predictions = output/predictions.csv
graph = 1
output_predictions_path = ./PREVISIONI/real_time_ens_hours_US500.csv
timestamp_column = timestamp_column
freq = H

; =======================================================
; SEZIONE ENSEMBLE
; =======================================================
[ENSEMBLE]
num_models = 20

